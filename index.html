<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>연구실 제습 성능 관리 시스템</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    background:#f3f4f6;
    font-family:Arial, sans-serif;
    color:#111827;
}

h1{
    margin-bottom:10px;
}

.main-desc{
    color:#4b5563;
    margin-bottom:30px;
}

.lab-section{
    background:#ffffff;
    border-radius:20px;
    padding:25px;
    margin-bottom:50px;
    box-shadow:0 2px 12px rgba(0,0,0,0.08);
}

.lab-title{
    font-size:30px;
    font-weight:bold;
    color:#111827;
}

.lab-subtitle{
    color:#6b7280;
    margin-top:5px;
    margin-bottom:25px;
}

.status-box{
    background:#f9fafb;
    border:1px solid #d1d5db;
    border-radius:12px;
    padding:15px;
    margin-bottom:20px;
    line-height:1.7;
}

.summary-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-bottom:25px;
}

.summary-item{
    background:#f9fafb;
    border-radius:12px;
    padding:15px;
    border:1px solid #d1d5db;
}

.summary-title{
    font-size:13px;
    color:#6b7280;
    margin-bottom:8px;
}

.summary-value{
    font-size:26px;
    font-weight:bold;
}

.analysis-box{
    margin-top:30px;
}

.analysis-title{
    font-size:20px;
    font-weight:bold;
    margin-bottom:12px;
}

.table-wrap{
    overflow:auto;
    border-radius:12px;
}

table{
    width:100%;
    min-width:1200px;
    border-collapse:collapse;
    background:#ffffff;
}

th, td{
    border:1px solid #d1d5db;
    padding:8px;
    text-align:center;
    font-size:13px;
}

th{
    background:#e5e7eb;
    color:#111827;
}

.good{
    background:#d1fae5;
}

.bad{
    background:#fed7aa;
}

.none{
    background:#f3f4f6;
}

.error-box{
    background:#fee2e2;
    color:#991b1b;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
    line-height:1.8;
}

.loading{
    font-size:18px;
    color:#6b7280;
    margin-top:30px;
}

.refresh-box{
    margin-bottom:20px;
}

button{
    padding:10px 16px;
    border:none;
    border-radius:10px;
    background:#4b5563;
    color:white;
    cursor:pointer;
    font-size:14px;
}

button:hover{
    background:#374151;
}

.update-time{
    margin-top:10px;
    color:#6b7280;
    font-size:13px;
}

</style>
</head>

<body>

<h1>연구실 제습 성능 관리 시스템</h1>

<div class="main-desc">
인천광역시 중구 북성동1가 기준 기상정보 및 연구실 제습 성능 분석
</div>

<div class="refresh-box">

    <button onclick="location.reload()">
        데이터 새로고침
    </button>

    <div class="update-time" id="updateTime"></div>

</div>

<div id="app">

    <div class="loading">
        데이터 불러오는 중...
    </div>

</div>

<script>

const START_DATE = "2026-05-08";

const WEATHER_API =
"https://api.open-meteo.com/v1/forecast";

const LAT = 37.4738;
const LON = 126.6215;

const SPREADSHEET_ID =
"1nEYNEW9g9omiNviB8yW4Vjd3TecZlSUBIvmMA9DvIfw";

const SHEET_GID = {

    "1연구실":"0",
    "2연구실":"781103558"

};

const labs = [

    {
        id:"1연구실",
        title:"1연구실",
        subtitle:"고체 전해질 제품화 연구실"
    },

    {
        id:"2연구실",
        title:"2연구실",
        subtitle:"디스플레이 소재 연구실 (공실)"
    }

];

let weatherRows = [];

window.onload = () => {

    init();

};


// ========================================
// 시작
// ========================================

async function init(){

    try{

        document.getElementById("updateTime")
        .innerText =
            "마지막 업데이트 : " +
            new Date().toLocaleString("ko-KR");

        document.getElementById("app").innerHTML = "";

        await loadWeatherData();

        for(const lab of labs){

            try{

                const rows =
                    await loadGoogleSheet(lab.id);

                renderLab(lab, rows);

            }catch(error){

                renderErrorLab(
                    lab,
                    error.message
                );

            }

        }

    }catch(error){

        document.getElementById("app").innerHTML =
        `
        <div class="error-box">

            전체 데이터 로딩 실패
            <br><br>

            ${error.message}

        </div>
        `;

    }

}


// ========================================
// 기상 API 조회
// ========================================

async function loadWeatherData(){

    const today = new Date();

    const endDate =
        today.getFullYear() + "-" +
        String(today.getMonth()+1).padStart(2,'0') + "-" +
        String(today.getDate()).padStart(2,'0');

    const url =
        `${WEATHER_API}` +
        `?latitude=${LAT}` +
        `&longitude=${LON}` +
        `&daily=temperature_2m_mean,relative_humidity_2m_mean` +
        `&timezone=Asia%2FSeoul` +
        `&start_date=${START_DATE}` +
        `&end_date=${endDate}`;

    const response =
        await fetch(url);

    if(!response.ok){

        throw new Error(
            "기상 API 조회 실패"
        );

    }

    const data =
        await response.json();

    if(!data.daily){

        throw new Error(
            "기상 데이터 없음"
        );

    }

    weatherRows =
        data.daily.time.map((date, idx)=>{

            return {

                date:date,
                month:Number(date.slice(5,7)),
                avgTemp:
                    data.daily.temperature_2m_mean[idx],

                avgHum:
                    data.daily.relative_humidity_2m_mean[idx]

            };

        });

}


// ========================================
// Google Sheets 조회
// ========================================

async function loadGoogleSheet(sheetName){

    const gid =
        SHEET_GID[sheetName];

    const url =
`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${gid}`;

    const response =
        await fetch(url);

    if(!response.ok){

        throw new Error(
            `${sheetName} 시트 조회 실패`
        );

    }

    const text =
        await response.text();

    return parseCSV(text);

}


// ========================================
// CSV 파싱
// ========================================

function parseCSV(text){

    const lines =
        text.trim().split("\n");

    const headers =
        lines[0]
        .split(",")
        .map(h =>
            h.replace(/"/g,"").trim()
        );

    return lines.slice(1).map(line=>{

        const values =
            line.split(",").map(v =>
                v.replace(/"/g,"").trim()
            );

        const obj = {};

        headers.forEach((h,i)=>{

            obj[h] =
                values[i] || "";

        });

        return obj;

    });

}


// ========================================
// 평균 계산
// ========================================

function avg(arr){

    if(!arr.length) return "-";

    return Math.round(
        (arr.reduce((a,b)=>a+b,0)/arr.length)*10
    )/10;

}


// ========================================
// 주차 계산
// ========================================

function getWeekNumber(dateString){

    const day =
        Number(dateString.split("-")[2]);

    return Math.ceil(day / 7);

}


// ========================================
// 연구실 렌더
// ========================================

function renderLab(lab, rows){

    const app =
        document.getElementById("app");

    let map = {};

    rows.forEach(r=>{

        const date =
            (r["날짜"] || "").trim();

        map[date] = {

            currentHum:
                Number(r["현재습도"]),

            targetHum:
                Number(r["목표습도"])

        };

    });

    let totalEffect = 0;
    let totalOutdoor = 0;
    let totalIndoor = 0;

    let effectCount = 0;
    let success = 0;

    let dailyHTML = "";

    let weeklyData = {};

    weatherRows.forEach(row=>{

        const manual =
            map[row.date] || {};

        const currentHum =
            manual.currentHum;

        const targetHum =
            manual.targetHum;

        const hasData =
            !isNaN(currentHum) &&
            !isNaN(targetHum) &&
            currentHum !== 0 &&
            targetHum !== 0;

        let effect = "";
        let over = "";
        let result = "미확인";
        let cls = "none";

        if(hasData){

            effect =
                Math.round(
                    (row.avgHum-currentHum)*10
                )/10;

            over =
                Math.round(
                    (currentHum-targetHum)*10
                )/10;

            totalEffect += effect;
            totalOutdoor += row.avgHum;
            totalIndoor += currentHum;

            effectCount++;

            const week =
                getWeekNumber(row.date);

            const weekKey =
                `${row.month}월 ${week}주차`;

            if(!weeklyData[weekKey]){

                weeklyData[weekKey] = {

                    outdoor:[],
                    indoor:[],
                    effect:[],
                    success:0,
                    total:0

                };

            }

            weeklyData[weekKey].outdoor.push(
                row.avgHum
            );

            weeklyData[weekKey].indoor.push(
                currentHum
            );

            weeklyData[weekKey].effect.push(
                effect
            );

            weeklyData[weekKey].total++;

            if(currentHum <= targetHum){

                result = "목표 달성";
                cls = "good";

                success++;

                weeklyData[weekKey].success++;

            }else{

                result = "목표 미달";
                cls = "bad";

            }

        }

        dailyHTML += `
            <tr class="${cls}">
                <td>${row.date}</td>
                <td>${row.month}월</td>
                <td>${row.avgTemp ?? ""}</td>
                <td>${row.avgHum ?? ""}</td>
                <td>${hasData ? currentHum : ""}</td>
                <td>${hasData ? targetHum : ""}</td>
                <td>${hasData ? over : ""}</td>
                <td>${hasData ? effect : ""}</td>
                <td>${result}</td>
            </tr>
        `;

    });

    const avgOutdoor =
        effectCount
        ? Math.round((totalOutdoor/effectCount)*10)/10
        : "-";

    const avgIndoor =
        effectCount
        ? Math.round((totalIndoor/effectCount)*10)/10
        : "-";

    const avgEffect =
        effectCount
        ? Math.round((totalEffect/effectCount)*10)/10
        : "-";

    const successRate =
        effectCount
        ? Math.round((success/effectCount)*1000)/10
        : "-";


// ========================================
// 주차별 평균
// ========================================

    let weeklyHTML = "";

    Object.keys(weeklyData).forEach(week=>{

        const data =
            weeklyData[week];

        weeklyHTML += `
            <tr>
                <td>${week}</td>
                <td>${avg(data.outdoor)}%</td>
                <td>${avg(data.indoor)}%</td>
                <td>${avg(data.effect)}%p</td>
                <td>
                    ${
                        Math.round(
                            (data.success/data.total)
                            *1000
                        )/10
                    }%
                </td>
            </tr>
        `;

    });


// ========================================
// 출력
// ========================================

    app.innerHTML += `

        <div class="lab-section">

            <div class="lab-title">
                ${lab.title}
            </div>

            <div class="lab-subtitle">
                ${lab.subtitle}
            </div>

            <div class="status-box">

                <b>기준 지역</b>
                <br>

                인천광역시 중구 북성동1가
                <br><br>

                <b>기상정보 API 자동 연동</b>
                <br>

                Open-Meteo Weather API 기반

            </div>

            <div class="summary-grid">

                <div class="summary-item">
                    <div class="summary-title">
                        기록 일수
                    </div>

                    <div class="summary-value">
                        ${effectCount}일
                    </div>
                </div>

                <div class="summary-item">
                    <div class="summary-title">
                        평균 외기 습도
                    </div>

                    <div class="summary-value">
                        ${avgOutdoor}%
                    </div>
                </div>

                <div class="summary-item">
                    <div class="summary-title">
                        평균 실내 습도
                    </div>

                    <div class="summary-value">
                        ${avgIndoor}%
                    </div>
                </div>

                <div class="summary-item">
                    <div class="summary-title">
                        평균 제습 효과
                    </div>

                    <div class="summary-value">
                        ${avgEffect}%p
                    </div>
                </div>

                <div class="summary-item">
                    <div class="summary-title">
                        목표 달성률
                    </div>

                    <div class="summary-value">
                        ${successRate}%
                    </div>
                </div>

            </div>


            <div class="analysis-box">

                <div class="analysis-title">
                    주차별 평균 분석
                </div>

                <div class="table-wrap">

                    <table>

                        <thead>
                            <tr>
                                <th>주차</th>
                                <th>평균 외기습도</th>
                                <th>평균 실내습도</th>
                                <th>평균 제습효과</th>
                                <th>목표 달성률</th>
                            </tr>
                        </thead>

                        <tbody>

                            ${weeklyHTML}

                        </tbody>

                    </table>

                </div>

            </div>


            <div class="analysis-box">

                <div class="analysis-title">
                    일별 상세 데이터
                </div>

                <div class="table-wrap">

                    <table>

                        <thead>

                            <tr>
                                <th>날짜</th>
                                <th>월</th>
                                <th>외기 평균기온</th>
                                <th>외기 평균습도</th>
                                <th>현재습도</th>
                                <th>목표습도</th>
                                <th>목표 초과</th>
                                <th>제습 효과</th>
                                <th>판정</th>
                            </tr>

                        </thead>

                        <tbody>

                            ${dailyHTML}

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    `;

}


// ========================================
// 에러 출력
// ========================================

function renderErrorLab(lab, msg){

    const app =
        document.getElementById("app");

    app.innerHTML += `

        <div class="lab-section">

            <div class="lab-title">
                ${lab.title}
            </div>

            <div class="lab-subtitle">
                ${lab.subtitle}
            </div>

            <div class="error-box">

                데이터 로딩 실패
                <br><br>

                오류 내용:
                <br>

                ${msg}

            </div>

        </div>

    `;

}

</script>

</body>
</html>
