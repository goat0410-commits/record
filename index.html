<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>연구실 제습 성능 관리 시스템</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    background:#f3f4f6;
    font-family:Arial, sans-serif;
    color:#111827;
}

h1{
    margin-bottom:10px;
}

.main-desc{
    color:#4b5563;
    margin-bottom:20px;
    line-height:1.8;
}

.info-box{
    background:#f9fafb;
    border:1px solid #d1d5db;
    border-radius:12px;
    padding:15px;
    margin-bottom:30px;
    line-height:1.8;
}

.lab-section{
    background:#ffffff;
    border-radius:20px;
    padding:25px;
    margin-bottom:50px;
    box-shadow:0 2px 12px rgba(0,0,0,0.08);
}

.lab-title{
    font-size:30px;
    font-weight:bold;
}

.lab-subtitle{
    color:#6b7280;
    margin-top:5px;
    margin-bottom:25px;
}

.status-box{
    background:#f9fafb;
    border:1px solid #d1d5db;
    border-radius:12px;
    padding:15px;
    margin-bottom:20px;
    line-height:1.7;
}

.analysis-box{
    margin-top:30px;
}

.analysis-title{
    font-size:20px;
    font-weight:bold;
    margin-bottom:12px;
}

.table-wrap{
    overflow:auto;
    border-radius:12px;
}

table{
    width:100%;
    min-width:2400px;
    border-collapse:collapse;
    background:#ffffff;
}

th, td{
    border:1px solid #d1d5db;
    padding:8px;
    text-align:center;
    font-size:13px;
}

th{
    background:#e5e7eb;
}

.good{
    background:#d1fae5;
}

.bad{
    background:#fed7aa;
}

.none{
    background:#f3f4f6;
}

.error-box{
    background:#fee2e2;
    color:#991b1b;
    padding:20px;
    border-radius:12px;
    line-height:1.8;
}

button{
    padding:10px 16px;
    border:none;
    border-radius:10px;
    background:#4b5563;
    color:white;
    cursor:pointer;
    font-size:14px;
    margin-right:10px;
}

button:hover{
    background:#374151;
}

.update-time{
    margin-top:10px;
    color:#6b7280;
    font-size:13px;
}

</style>
</head>

<body>

<h1>연구실 제습 성능 관리 시스템</h1>

<div class="main-desc">
인천광역시 중구 북성동1가 기준 연구실 제습 성능 분석
</div>

<div class="info-box">

<b>측정 기준</b>

<br><br>

- 오전 기준 : 오전 08:00
<br>

- 오후 기준 : 오후 02:00

<br><br>


※ 데이터 관리 시작일 : 2026-05-08
<br>

</div>

<button onclick="location.reload()">
데이터 새로고침
</button>

<button onclick="downloadExcel()">
엑셀 다운로드
</button>

<div class="update-time" id="updateTime"></div>

<br><br>

<div id="app">
데이터 불러오는 중...
</div>

<script>

const SPREADSHEET_ID =
"1nEYNEW9g9omiNviB8yW4Vjd3TecZlSUBIvmMA9DvIfw";

const SHEET_GID = {

    "1연구실":"0",

    "2연구실":"781103558"

};

const labs = [

    {
        id:"1연구실",
        title:"1연구실",
        subtitle:"고체 전해질 제품화 연구실"
    },

    {
        id:"2연구실",
        title:"2연구실",
        subtitle:"디스플레이 소재 연구실 (공실)"
    }

];

window.onload = () => {

    init();

};

async function init(){

    document.getElementById("updateTime")
    .innerText =
        "마지막 업데이트 : " +
        new Date().toLocaleString("ko-KR");

    document.getElementById("app").innerHTML = "";

    for(const lab of labs){

        try{

            const rows =
                await loadGoogleSheet(lab.id);

            renderLab(lab, rows);

        }catch(error){

            renderErrorLab(
                lab,
                error.message
            );

        }

    }

}


// ========================================
// Google Sheets 조회
// ========================================

async function loadGoogleSheet(sheetName){

    const gid =
        SHEET_GID[sheetName];

    if(!gid || gid === "실제_gid_입력"){

        throw new Error(
            `${sheetName} gid 미설정`
        );

    }

    const url =
`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${gid}`;

    const response =
        await fetch(url);

    if(!response.ok){

        throw new Error(
            `${sheetName} 시트 조회 실패`
        );

    }

    const text =
        await response.text();

    return parseCSV(text);

}


// ========================================
// CSV 파싱
// ========================================

function parseCSV(text){

    const lines =
        text.trim().split("\n");

    const headers =
        lines[0]
        .split(",")
        .map(h =>
            h.replace(/"/g,"").trim()
        );

    return lines.slice(1).map(line=>{

        const values =
            line.split(",").map(v =>
                v.replace(/"/g,"").trim()
            );

        const obj = {};

        headers.forEach((h,i)=>{

            obj[h] =
                values[i] || "";

        });

        return obj;

    });

}


// ========================================
// 월 기준 주차 계산
// ========================================

function getMonthWeek(dateStr){

    const date =
        new Date(dateStr);

    const year =
        date.getFullYear();

    const month =
        date.getMonth();

    const firstDay =
        new Date(year, month, 1);

    const firstDate =
        firstDay.getDate();

    const offset =
        firstDay.getDay();

    const week =
        Math.ceil(
            (date.getDate() + offset) / 7
        );

    return `${month+1}월 ${week}주차`;

}


// ========================================
// 평균 계산
// ========================================

function avg(arr){

    if(arr.length === 0){

        return "-";

    }

    return Math.round(
        (
            arr.reduce((a,b)=>a+b,0)
            / arr.length
        ) * 10
    ) / 10;

}


// ========================================
// 연구실 출력
// ========================================

function renderLab(lab, rows){

    const app =
        document.getElementById("app");

    let html = "";

    const today =
        new Date();

    // 핵심 수정
    // timezone 오차 제거

    const koreaToday =
        new Date(
            today.getTime()
            + (9 * 60 * 60 * 1000)
        );

    const todayStr =
        koreaToday
        .toISOString()
        .split("T")[0];

    let weeklyMap = {};

    rows.forEach(r=>{

        const date =
            (r["날짜"] || "").trim();

        // 오늘 이후 날짜 숨김

        if(date > todayStr){

            return;

        }

        const amCurrent =
            Number(r["오전현재습도"]);

        const amTarget =
            Number(r["오전목표습도"]);

        const pmCurrent =
            Number(r["오후현재습도"]);

        const pmTarget =
            Number(r["오후목표습도"]);

        const amOutside =
            Number(r["오전외기습도"]);

        const pmOutside =
            Number(r["오후외기습도"]);

        const amExists =
            amCurrent && amTarget;

        const pmExists =
            pmCurrent && pmTarget;

        const amEffect =
            amExists
            ? Math.round(
                (amOutside-amCurrent)*10
              ) / 10
            : "";

        const pmEffect =
            pmExists
            ? Math.round(
                (pmOutside-pmCurrent)*10
              ) / 10
            : "";

        const amResult =
            !amExists
            ? "미확인"
            : (
                amCurrent <= amTarget
                ? "목표 달성"
                : "목표 미달"
            );

        const pmResult =
            !pmExists
            ? "미확인"
            : (
                pmCurrent <= pmTarget
                ? "목표 달성"
                : "목표 미달"
            );

        const amClass =
            !amExists
            ? "none"
            : (
                amCurrent <= amTarget
                ? "good"
                : "bad"
            );

        const pmClass =
            !pmExists
            ? "none"
            : (
                pmCurrent <= pmTarget
                ? "good"
                : "bad"
            );


// ========================================
// 주차별 평균 계산
// ========================================

        const week =
            getMonthWeek(date);

        if(!weeklyMap[week]){

            weeklyMap[week] = {

                amOutside:[],
                pmOutside:[],
                amInside:[],
                pmInside:[],
                amEffect:[],
                pmEffect:[]

            };

        }

        if(amExists){

            weeklyMap[week]
            .amOutside.push(amOutside);

            weeklyMap[week]
            .amInside.push(amCurrent);

            weeklyMap[week]
            .amEffect.push(amEffect);

        }

        if(pmExists){

            weeklyMap[week]
            .pmOutside.push(pmOutside);

            weeklyMap[week]
            .pmInside.push(pmCurrent);

            weeklyMap[week]
            .pmEffect.push(pmEffect);

        }

        html += `

            <tr>

                <td>${date}</td>

                <!-- 오전 -->

                <td>${r["오전외기온도"] || ""}</td>

                <td>${r["오전외기습도"] || ""}</td>

                <td class="${amClass}">
                    ${amExists ? amCurrent : ""}
                </td>

                <td class="${amClass}">
                    ${amExists ? amTarget : ""}
                </td>

                <td class="${amClass}">
                    ${amEffect}
                </td>

                <td class="${amClass}">
                    ${amResult}
                </td>


                <!-- 오후 -->

                <td>${r["오후외기온도"] || ""}</td>

                <td>${r["오후외기습도"] || ""}</td>

                <td class="${pmClass}">
                    ${pmExists ? pmCurrent : ""}
                </td>

                <td class="${pmClass}">
                    ${pmExists ? pmTarget : ""}
                </td>

                <td class="${pmClass}">
                    ${pmEffect}
                </td>

                <td class="${pmClass}">
                    ${pmResult}
                </td>

                <td>
                    ${r["비고"] || ""}
                </td>

            </tr>

        `;

    });


// ========================================
// 주차별 평균 HTML
// ========================================

    let weeklyHtml = "";

    Object.keys(weeklyMap).forEach(week=>{

        const w =
            weeklyMap[week];

        weeklyHtml += `

            <tr>

                <td>${week}</td>

                <td>${avg(w.amOutside)}%</td>

                <td>${avg(w.amInside)}%</td>

                <td>${avg(w.amEffect)}%p</td>

                <td>${avg(w.pmOutside)}%</td>

                <td>${avg(w.pmInside)}%</td>

                <td>${avg(w.pmEffect)}%p</td>

            </tr>

        `;

    });


// ========================================
// 출력
// ========================================

    app.innerHTML += `

        <div class="lab-section">

            <div class="lab-title">
                ${lab.title}
            </div>

            <div class="lab-subtitle">
                ${lab.subtitle}
            </div>

            <div class="status-box">

                <b>기준 지역</b>
                <br>

                인천광역시 중구 북성동1가

                <br><br>


            </div>


            <!-- 주차별 평균 -->

            <div class="analysis-box">

                <div class="analysis-title">
                    주차별 평균 요약
                </div>

                <div class="table-wrap">

                    <table>

                        <thead>

                            <tr>

                                <th>주차</th>

                                <th>오전 평균 외기습도</th>

                                <th>오전 평균 실내습도</th>

                                <th>오전 평균 제습효과</th>

                                <th>오후 평균 외기습도</th>

                                <th>오후 평균 실내습도</th>

                                <th>오후 평균 제습효과</th>

                            </tr>

                        </thead>

                        <tbody>

                            ${weeklyHtml}

                        </tbody>

                    </table>

                </div>

            </div>


            <!-- 상세 데이터 -->

            <div class="analysis-box">

                <div class="analysis-title">
                    일별 상세 데이터
                </div>

                <div class="table-wrap">

                    <table class="export-table">

                        <thead>

                            <tr>

                                <th rowspan="2">
                                    날짜
                                </th>

                                <th colspan="6">
                                    오전 08:00 기준
                                </th>

                                <th colspan="6">
                                    오후 02:00 기준
                                </th>

                                <th rowspan="2">
                                    비고
                                </th>

                            </tr>

                            <tr>

                                <th>외기온도</th>
                                <th>외기습도</th>
                                <th>현재습도</th>
                                <th>목표습도</th>
                                <th>제습효과</th>
                                <th>판정</th>

                                <th>외기온도</th>
                                <th>외기습도</th>
                                <th>현재습도</th>
                                <th>목표습도</th>
                                <th>제습효과</th>
                                <th>판정</th>

                            </tr>

                        </thead>

                        <tbody>

                            ${html}

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    `;

}


// ========================================
// 엑셀 다운로드
// ========================================

function downloadExcel(){

    const wb =
        XLSX.utils.book_new();

    document.querySelectorAll(".export-table")
    .forEach((table, idx)=>{

        const ws =
            XLSX.utils.table_to_sheet(table);

        XLSX.utils.book_append_sheet(
            wb,
            ws,
            `연구실${idx+1}`
        );

    });

    XLSX.writeFile(
        wb,
        "연구실_제습_성능_관리.xlsx"
    );

}


// ========================================
// 에러 출력
// ========================================

function renderErrorLab(lab, msg){

    const app =
        document.getElementById("app");

    app.innerHTML += `

        <div class="lab-section">

            <div class="lab-title">
                ${lab.title}
            </div>

            <div class="lab-subtitle">
                ${lab.subtitle}
            </div>

            <div class="error-box">

                데이터 로딩 실패
                <br><br>

                ${msg}

            </div>

        </div>

    `;

}

</script>

</body>
</html>
