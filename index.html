<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>연구실 제습 성능 관리 시스템</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    background:#f4f7fb;
    font-family:Arial, sans-serif;
}

h1{
    margin-bottom:10px;
}

.main-desc{
    color:#666;
    margin-bottom:30px;
}

.lab-section{
    background:#fff;
    border-radius:20px;
    padding:25px;
    margin-bottom:50px;
    box-shadow:0 2px 12px rgba(0,0,0,0.08);
}

.lab-title{
    font-size:30px;
    font-weight:bold;
    color:#1d4ed8;
}

.lab-subtitle{
    color:#666;
    margin-top:5px;
    margin-bottom:25px;
}

.status-box{
    background:#eff6ff;
    border:1px solid #bfdbfe;
    border-radius:12px;
    padding:15px;
    margin-bottom:20px;
    line-height:1.7;
}

.summary-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-bottom:25px;
}

.summary-item{
    background:#f8fafc;
    border-radius:12px;
    padding:15px;
}

.summary-title{
    font-size:13px;
    color:#666;
    margin-bottom:8px;
}

.summary-value{
    font-size:26px;
    font-weight:bold;
}

.analysis-box{
    margin-top:25px;
}

.analysis-title{
    font-size:20px;
    font-weight:bold;
    margin-bottom:12px;
}

.table-wrap{
    overflow:auto;
    border-radius:12px;
}

table{
    width:100%;
    min-width:1100px;
    border-collapse:collapse;
    background:#fff;
}

th, td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
    font-size:13px;
}

th{
    background:#dbeafe;
}

.good{
    background:#d1fae5;
}

.bad{
    background:#fed7aa;
}

.none{
    background:#f3f4f6;
}

.error-box{
    background:#fee2e2;
    color:#991b1b;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
    line-height:1.8;
}

.loading{
    font-size:18px;
    color:#666;
    margin-top:30px;
}

</style>
</head>

<body>

<h1>연구실 제습 성능 관리 시스템</h1>

<div class="main-desc">
인천광역시 중구 개항동 기준 기상정보 및 연구실 제습 성능 분석
</div>

<div id="app">
    <div class="loading">
        데이터 불러오는 중...
    </div>
</div>

<script>

const FIXED_LAT = 37.4738;
const FIXED_LON = 126.6215;

const SPREADSHEET_ID =
"1nEYNEW9g9omiNviB8yW4Vjd3TecZlSUBIvmMA9DvIfw";

const labs = [

    {
        id:"1연구실",
        title:"1연구실",
        subtitle:"고체 전해질 제품화 연구실"
    },

    {
        id:"2연구실",
        title:"2연구실",
        subtitle:"디스플레이 소재 연구실 (공실)"
    }

];

let weatherRows = [];


// ========================================
// 시작
// ========================================

init();

async function init(){

    try{

        await fetchWeather();

        document.getElementById("app").innerHTML = "";

        for(const lab of labs){

            try{

                const rows =
                    await loadGoogleSheet(lab.id);

                renderLab(lab, rows);

            }catch(error){

                console.error(
                    `${lab.id} 시트 로딩 실패`,
                    error
                );

                renderErrorLab(lab);

            }

        }

    }catch(error){

        console.error("초기 로딩 실패", error);

        document.getElementById("app").innerHTML =
            `
            <div class="error-box">

                데이터 로딩 실패
                <br><br>

                확인 필요 사항:
                <br>

                1. Google Sheets 웹 게시 여부
                <br>

                2. 시트 탭명 일치 여부
                <br>

                3. Google Sheets 공개 권한 여부

            </div>
            `;

    }

}


// ========================================
// 기상정보 조회
// ========================================

async function fetchWeather(){

    const start = "2026-05-01";

    const today = new Date();

    const end =
        today.getFullYear() + "-" +
        String(today.getMonth()+1).padStart(2,'0') + "-" +
        String(today.getDate()).padStart(2,'0');

    const url =
        `https://archive-api.open-meteo.com/v1/archive` +
        `?latitude=${FIXED_LAT}` +
        `&longitude=${FIXED_LON}` +
        `&start_date=${start}` +
        `&end_date=${end}` +
        `&hourly=temperature_2m,relative_humidity_2m` +
        `&timezone=Asia%2FSeoul`;

    const response = await fetch(url);

    const data = await response.json();

    weatherRows =
        makeDailyAverage(data.hourly);

}


// ========================================
// Google Sheets 조회
// ========================================

async function loadGoogleSheet(sheetName){

    const url =
`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;

    const response = await fetch(url);

    if(!response.ok){

        throw new Error("Google Sheets 조회 실패");

    }

    const text = await response.text();

    return parseCSV(text);

}


// ========================================
// CSV 파싱
// ========================================

function parseCSV(text){

    const lines =
        text.trim().split("\n");

    const headers =
        lines[0]
        .split(",")
        .map(h =>
            h.replace(/"/g,"").trim()
        );

    return lines.slice(1).map(line=>{

        const values =
            line.split(",").map(v =>
                v.replace(/"/g,"").trim()
            );

        const obj = {};

        headers.forEach((h,i)=>{

            obj[h] = values[i] || "";

        });

        return obj;

    });

}


// ========================================
// 평균 계산
// ========================================

function avg(arr){

    if(!arr.length) return null;

    return Math.round(
        (arr.reduce((a,b)=>a+b,0)/arr.length)*10
    )/10;

}


// ========================================
// 일 평균 계산
// ========================================

function makeDailyAverage(hourly){

    const daily = {};

    hourly.time.forEach((time, idx)=>{

        const date = time.slice(0,10);

        if(!daily[date]){

            daily[date] = {
                temp:[],
                hum:[]
            };

        }

        daily[date].temp.push(
            hourly.temperature_2m[idx]
        );

        daily[date].hum.push(
            hourly.relative_humidity_2m[idx]
        );

    });

    return Object.keys(daily).map(date=>{

        return {

            date:date,
            month:Number(date.slice(5,7)),
            avgTemp:avg(daily[date].temp),
            avgHum:avg(daily[date].hum)

        };

    });

}


// ========================================
// 연구실 렌더
// ========================================

function renderLab(lab, rows){

    const app =
        document.getElementById("app");

    let map = {};

    rows.forEach(r=>{

        const date =
            (r["날짜"] || "").trim();

        const currentHum =
            Number(r["현재습도"]);

        const targetHum =
            Number(r["목표습도"]);

        map[date] = {

            currentHum:
                currentHum,

            targetHum:
                targetHum

        };

    });

    let totalEffect = 0;
    let totalOutdoor = 0;
    let totalIndoor = 0;

    let effectCount = 0;
    let success = 0;

    let dailyHTML = "";

    weatherRows.forEach(row=>{

        const manual =
            map[row.date] || {};

        const currentHum =
            manual.currentHum;

        const targetHum =
            manual.targetHum;

        const hasData =
            !isNaN(currentHum) &&
            !isNaN(targetHum) &&
            currentHum !== 0 &&
            targetHum !== 0;

        let effect = "";
        let over = "";
        let result = "미확인";
        let cls = "none";

        if(hasData){

            effect =
                Math.round((row.avgHum-currentHum)*10)/10;

            over =
                Math.round((currentHum-targetHum)*10)/10;

            totalEffect += effect;
            totalOutdoor += row.avgHum;
            totalIndoor += currentHum;

            effectCount++;

            if(currentHum <= targetHum){

                result = "목표 달성";
                cls = "good";

                success++;

            }else{

                result = "목표 미달";
                cls = "bad";

            }

        }

        dailyHTML += `
            <tr class="${cls}">
                <td>${row.date}</td>
                <td>${row.month}월</td>
                <td>${row.avgTemp ?? ""}</td>
                <td>${row.avgHum ?? ""}</td>
                <td>${hasData ? currentHum : ""}</td>
                <td>${hasData ? targetHum : ""}</td>
                <td>${hasData ? over : ""}</td>
                <td>${hasData ? effect : ""}</td>
                <td>${result}</td>
            </tr>
        `;

    });

    const avgOutdoor =
        effectCount
        ? Math.round((totalOutdoor/effectCount)*10)/10
        : "-";

    const avgIndoor =
        effectCount
        ? Math.round((totalIndoor/effectCount)*10)/10
        : "-";

    const avgEffect =
        effectCount
        ? Math.round((totalEffect/effectCount)*10)/10
        : "-";

    const successRate =
        effectCount
        ? Math.round((success/effectCount)*1000)/10
        : "-";

    app.innerHTML += `

        <div class="lab-section">

            <div class="lab-title">
                ${lab.title}
            </div>

            <div class="lab-subtitle">
                ${lab.subtitle}
            </div>

            <div class="status-box">

                <b>기준 지역</b>
                <br>

                인천광역시 중구 개항동
                <br><br>

                <b>Google Sheets 자동 연동 완료</b>
                <br>

                최신 데이터 자동 반영

            </div>

            <div class="summary-grid">

                <div class="summary-item">
                    <div class="summary-title">기록 일수</div>
                    <div class="summary-value">
                        ${effectCount}일
                    </div>
                </div>

                <div class="summary-item">
                    <div class="summary-title">평균 외기 습도</div>
                    <div class="summary-value">
                        ${avgOutdoor}%
                    </div>
                </div>

                <div class="summary-item">
                    <div class="summary-title">평균 실내 습도</div>
                    <div class="summary-value">
                        ${avgIndoor}%
                    </div>
                </div>

                <div class="summary-item">
                    <div class="summary-title">평균 제습 효과</div>
                    <div class="summary-value">
                        ${avgEffect}%p
                    </div>
                </div>

                <div class="summary-item">
                    <div class="summary-title">목표 달성률</div>
                    <div class="summary-value">
                        ${successRate}%
                    </div>
                </div>

            </div>

            <div class="analysis-box">

                <div class="analysis-title">
                    일별 상세 데이터
                </div>

                <div class="table-wrap">

                    <table>

                        <thead>

                            <tr>
                                <th>날짜</th>
                                <th>월</th>
                                <th>외기 평균기온</th>
                                <th>외기 평균습도</th>
                                <th>현재습도</th>
                                <th>목표습도</th>
                                <th>목표 초과</th>
                                <th>제습 효과</th>
                                <th>판정</th>
                            </tr>

                        </thead>

                        <tbody>

                            ${dailyHTML}

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    `;

}


// ========================================
// 에러 렌더
// ========================================

function renderErrorLab(lab){

    const app =
        document.getElementById("app");

    app.innerHTML += `

        <div class="lab-section">

            <div class="lab-title">
                ${lab.title}
            </div>

            <div class="lab-subtitle">
                ${lab.subtitle}
            </div>

            <div class="error-box">

                Google Sheets 데이터 조회 실패
                <br><br>

                확인 필요 사항:
                <br>

                - 시트 탭명 일치 여부
                <br>

                - 웹 게시 여부
                <br>

                - 링크 공개 여부

            </div>

        </div>

    `;

}

</script>

</body>
</html>
